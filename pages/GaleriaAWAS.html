<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/DiseñoGeneral.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="../images/Favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <title>Galería AWAS</title>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar position-relative">
        <div class="container-fluid d-flex justify-content-between align-items-center navbar-container">
          <a class="navbar-brand nvbar d-flex align-items-center" href="../pages/Front_APPs.html">
            <img src="../images/teco.png" alt="Logo" width="70" height="22" class="d-inline-block">
            <span class="ms-2">PORTAL ITAS</span>
          </a>
          <span class="navbar-text nvbar navbar-center">Galería AWAS</span>
          <div class="d-flex align-items-center gap-2">
            <a id="openProfile" style="cursor:pointer; color: #fff; text-decoration: underline;">Mi perfil</a>
            <button class="nvbar" onclick="history.back()" style="background:none; border:1px solid white; color:white; padding:4px 10px; border-radius:4px;">
              Volver
            </button>
          </div>
        </div>
    </nav>

  <!-- Modal Perfil -->
  <div class="modal fade" id="perfilModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Mi Perfil</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input id="perfilNombre" class="form-control" readonly />
          </div>
          <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input id="perfilApellido" class="form-control" readonly />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="perfilEmail" class="form-control" readonly />
          </div>
          <hr />
          <h6>Cambiar contraseña</h6>
          <div class="mb-3">
            <label class="form-label">Contraseña actual</label>
            <input id="perfilCurrentPass" type="password" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Nueva contraseña</label>
            <input id="perfilNewPass" type="password" maxlength="15" class="form-control" />
            <div class="form-text">La contraseña debe tener entre 8 y 15 caracteres.</div>
          </div>
          <div id="perfilResult" class="mt-2"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button id="perfilSaveBtn" type="button" class="btn btn-primary">Guardar</button>
        </div>
      </div>
    </div>
  </div>

<div class="container mt-5">
    <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-success text-white" onclick="nuevoAWA()">
            + Crear nuevo AWA
        </button>
    </div>
    <div class="table-responsive">
    <table class="table table-hover align-middle" id="tablaAwas">
      <thead class="table-dark">
        <tr>
          <th>ID_WA</th>
          <th>ID_AWA</th>
          <th>Título</th>
          <th>Estado</th>
          <th class="text-end">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <!-- JS -->
      </tbody>
    </table>
  </div>
  <div class="modal fade" id="modalAwa" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content p-4">

      <div class="modal-header">
        <h5 class="modal-title">Configuración AWA</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="inputIdAwa">
        <input type="hidden" id="inputIdRegistro">

        <!-- 🟦 SECCIÓN 1: IDENTIFICACIÓN -->
        <h6 class="mt-2">Identificación</h6>
        <div class="row g-3 mb-3">

          <div class="col-md-3">
            <label>ID_WA</label>
            <input type="text" id="inputIdWa" class="form-control" maxlength="10">
          </div>

          <div class="col-md-3">
            <label>ID_AWA</label>
            <input type="text" id="inputIdAwaVisible" class="form-control" disabled>
          </div>

          <div class="col-md-6">
            <label>Título</label>
            <input type="text" id="inputTitulo" class="form-control" maxlength="40">
          </div>

          <div class="col-md-6">
            <label>Detalle</label>
            <input type="text" id="inputDetalle" class="form-control"maxlength="80">
          </div>

          <div class="col-md-6">
            <label>URL</label>
            <input type="url" id="inputUrl" class="form-control" onclick="if(this.value.trim()) window.open(this.value.trim(), '_blank');">
          </div>

        </div>

        <!-- 🟩 SECCIÓN 2: OPERATIVO -->
        <h6>Operativo</h6>
        <div class="row g-3 mb-3">

          <div class="col-md-4">
            <label>Estado</label>
            <select id="inputEstado" class="form-select">
              <option>Activo</option>
              <option>Inactivo</option>
              <option>Backlog</option>
              <option>Desarrollo</option>
              <option>Pendiente</option>
            </select>
          </div>

          <div class="col-md-4">
            <label>Origen</label>
            <select id="inputOrigen" class="form-select">
              <option>Ordenes</option>
              <option>Incidente</option>
              <option>Incidente Ordenes</option>
            </select>
          </div>

          <div class="col-md-4">
            <label>Sistema</label>
            <input type="text" id="inputSistema" class="form-control">
          </div>

          <div class="col-md-4">
            <label>Negocio</label>
            <select id="inputNegocio" class="form-select">
              <option>Hogar</option>
              <option>Movil</option>
              <option>Hogar - Movil</option>
            </select>
          </div>

          <div class="col-md-6">
            <label>Sistema Análisis</label>
            <input type="text" id="inputSistemaAnalisis" class="form-control" maxlength="50">
          </div>

          <div class="col-md-6">
            <label>Sistema Acción</label>
            <input type="text" id="inputSistemaAccion" class="form-control" maxlength="50">
          </div>

          <div class="col-md-4">
            <label>ERR_AppORD</label>
            <input type="text" id="inputErr" class="form-control">
          </div>

          <div class="col-md-4">
            <label>Jira</label>
            <input type="text" id="inputJira" class="form-control">
          </div>

        </div>

        <!-- 🟨 SECCIÓN 3: FECHAS -->
        <h6>Fechas</h6>
        <div class="row g-3 mb-3">

          <div class="col-md-6">
            <label>Desde</label>
            <input type="date" id="inputDesde" class="form-control">
          </div>

          <div class="col-md-6">
            <label>Hasta</label>
            <input type="date" id="inputHasta" class="form-control">
          </div>

        </div>

        <!-- 🟧 SECCIÓN 4: PARÁMETROS -->
        <h6>Parámetros</h6>
        <div class="row g-3 mb-3">

          <div class="col-md-4">
            <label>HS Antigüedad</label>
            <input type="number" min="0" max="100" id="inputHS" class="form-control">
          </div>

          <div class="col-md-4">
            <label>RevITSS x100</label>
            <input type="number" min="0" max="100" id="inputRev100" class="form-control">
          </div>

          <div class="col-md-4">
            <label>RevITSS Max</label>
            <input type="number" min="0" max="100" id="inputRevMax" class="form-control">
          </div>

        </div>

        <!-- 🟧 SECCIÓN 5: RPA -->
        <h6>RPA</h6>
        <div class="row g-3 mb-3">

          <div class="col-md-3">
            <label>ID Flujo</label>
            <input type="number" id="inputFlujo" class="form-control">
          </div>

          <div class="col-md-3">
            <label>Prioridad</label>
            <input type="number" min="0" max="100" id="inputPrioridad" class="form-control">
          </div>

          <div class="col-md-3">
            <label>Max Encoladas</label>
            <input type="number" min="0" max="100" id="inputMaxCola" class="form-control">
          </div>

          <div class="col-md-3">
            <label>Frecuencia</label>
            <input type="number" min="0" max="100" id="inputFrecuencia" class="form-control">
          </div>

          <div class="col-md-3">
            <label>Frecuencia 2</label>
            <input type="number" min="0" max="100" id="inputFrecuencia2" class="form-control">
          </div>

          <div class="col-md-3">
            <label>Límite Bajada</label>
            <input type="number" min="0" max="100" min="0" id="inputLimiteBajada" class="form-control">
          </div>

        </div>

        <!-- 🟪 SECCIÓN 6: MÉTRICAS -->
        <h6>Métricas</h6>
        <div class="row g-3">

          <div class="col-md-4">
            <label>Volumen Diario</label>
            <input type="number" step="1" min="0" id="inputVolumen" class="form-control">
          </div>

          <div class="col-md-4">
            <label>Esfuerzo</label>
            <select id="inputEsfuerzo" class="form-select">
              <option></option>
              <option>Bajo</option>
              <option>Medio</option>
              <option>Alto</option>
            </select>
          </div>

          <div class="col-md-6">
            <label>TKT Resolution Category</label>
            <input type="text" id="inputTKTResolutionCategory" class="form-control">
          </div>

          <div class="col-md-6">
            <label>TKT Resolution Category Tier 2</label>
            <input type="text" id="inputTKTResolutionCategoryTier2" class="form-control">
          </div>

        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary text-white" onclick="guardarAWA()">Guardar</button>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="modalAwaNuevo" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content p-4">
      <div class="modal-header">
        <h5 class="modal-title">Crear nuevo AWA</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label>ID WA</label>
            <input type="text" id="inputIdWaNuevo" class="form-control" maxlength="10">
          </div>
          <div class="col-md-8">
            <label>Título</label>
            <input type="text" id="inputTituloNuevo" class="form-control" maxlength="40">
          </div>
          <div class="col-md-4">
            <label>Origen</label>
            <select id="inputOrigenNuevo" class="form-select">
              <option>Ordenes</option>
              <option>Incidente</option>
              <option>Incidente Ordenes</option>
            </select>
          </div>
          <div class="col-md-4">
            <label>Sistema</label>
            <input type="text" id="inputSistemaNuevo" class="form-control">
          </div>
          <div class="col-md-4">
            <label>Negocio</label>
            <select id="inputNegocioNuevo" class="form-select">
              <option>Hogar</option>
              <option>Movil</option>
              <option>Fija</option>
              <option>Fija - Movil</option>
            </select>
          </div>
          <div class="col-md-6">
            <label>ERR_AppORD</label>
            <input type="text" id="inputErrNuevo" class="form-control">
          </div>
          <div class="col-md-6">
            <label>Jira</label>
            <input type="text" id="inputJiraNuevo" class="form-control">
          </div>
          <div class="col-md-6">
            <label>Detalle</label>
            <input type="text" id="inputDetalleNuevo" class="form-control">
          </div>
          <div class="col-md-6">
            <label>URL</label>
            <input type="url" id="inputUrlNuevo" class="form-control" onclick="if(this.value.trim()) window.open(this.value.trim(), '_blank');">
          </div>
          <div class="col-md-4">
            <label>Volumen Diario</label>
            <input type="number" step="1" min="0" id="inputVolumenNuevo" class="form-control">
          </div>
          <div class="col-md-4">
            <label>Esfuerzo</label>
            <select id="inputEsfuerzoNuevo" class="form-select">
              <option></option>
              <option>Bajo</option>
              <option>Medio</option>
              <option>Alto</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary text-white" onclick="guardarNuevoAWA()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- 🔥 MODAL CONFIRMACIÓN -->
<div class="modal fade" id="modalConfirmacion" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-3">

      <div class="modal-header">
        <h5 class="modal-title">Confirmar acción</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p id="textoConfirmacion" class="mb-0"></p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>
        <button class="btn btn-primary text-white" id="btnConfirmarAccion">
          Confirmar
        </button>
      </div>

    </div>
  </div>
</div>


<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
  <div id="toastMsg" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastTexto"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>


</div>



 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/Front_APPs.js"></script>
  <script src="../js/galeriaAwas.js"></script>
  
</body>
</html>
