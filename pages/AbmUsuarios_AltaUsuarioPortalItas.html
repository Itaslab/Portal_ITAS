    <div class =container>
      <h2 class="text-center mb-4">Alta de Usuario - Portal ITAS</h2>
      <div class="row g-4">
        <!-- Formulario de alta de usuario -->
        <div class="col-md-6 mx-auto">
<form id="formAltaUsuario">

  <div class="mb-3">
    <label for="selectUsuario" class="form-label">Usuario</label>
    <select class="form-select" id="selectUsuario">
      <option value="">Seleccione un usuario</option>
    </select>
  </div>

  <div class="mb-3">
    <label for="email" class="form-label">Email</label>
    <input type="email" class="form-control" id="email" readonly>
  </div>

  <div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <input type="password" class="form-control" id="password">
  </div>

  <div class="mb-3">
    <label for="confirmPassword" class="form-label">Confirmar Password</label>
    <input type="password" class="form-control" id="confirmPassword">
  </div>

  <button type="submit" class="btn btn-primary">
    Registrar
  </button>

</form>
        </div>
      </div>
    </div>
