<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/DiseñoGeneral.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="../images/Favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <title>Alta usuario - Portal ITAS</title>
</head>
<body>
        <!-- Navbar -->
    <nav class="navbar position-relative">
        <div class="container-fluid d-flex justify-content-between align-items-center navbar-container">
          <a class="navbar-brand nvbar d-flex align-items-center" href="../pages/Front_APPs.html">
            <img src="../images/teco.png" alt="Logo" width="70" height="22" class="d-inline-block">
            <span class="ms-2">PORTAL ITAS</span>
          </a>
          <span class="navbar-text nvbar navbar-center">Alta de Usuario - Portal ITAS</span>
          <div class="d-flex align-items-center gap-2">
        <button class="nvbar" onclick="history.back()" style="background:none; border:1px solid white; color:white; padding:4px 10px; border-radius:4px;">
            Volver
          </button>
      </div>
        </div>
    </nav>

    <div class =container>
      <h2 class="text-center mb-4">Alta de Usuario - Portal ITAS</h2>
      <div class="row g-4">
        <!-- Formulario de alta de usuario -->
        <div class="col-md-6 mx-auto">
<form id="formAltaUsuario">

  <div class="mb-3">
    <label for="selectUsuario" class="form-label">Usuario</label>
    <select class="form-select" id="selectUsuario">
      <option value="">Seleccione un usuario</option>
    </select>
  </div>

  <div class="mb-3">
    <label for="email" class="form-label">Email</label>
    <input type="email" class="form-control" id="email" readonly>
  </div>

  <div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <input type="password" class="form-control" id="password">
  </div>

  <div class="mb-3">
    <label for="confirmPassword" class="form-label">Confirmar Password</label>
    <input type="password" class="form-control" id="confirmPassword">
  </div>


<div class="d-flex justify-content-end mb-3">

  <button 
    type="button"
    class="btn btn-warning"
    data-bs-toggle="modal"
    data-bs-target="#modalPermisos"
  >
    Agregar / Modificar Permisos
  </button>

</div>


  <button type="submit" class="btn btn-primary">
    Registrar
  </button>

</form>
        </div>
      </div>
    </div>

 <!-- ===================================================== -->
<!-- MODAL PERMISOS -->
<!-- ===================================================== -->

<div class="modal fade" id="modalPermisos" tabindex="-1">

  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

      <!-- HEADER -->
      <div class="modal-header">

        <h5 class="modal-title">
          Agregar Permiso
        </h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal">
        </button>

      </div>

      <!-- BODY -->
      <div class="modal-body">

        <!-- APLICACION -->
        <div class="mb-3">

          <label class="form-label">
            Aplicación
          </label>

          <select
            class="form-select"
            id="selectAplicacion"
          >

            <option value="">
              Seleccione aplicación
            </option>

          </select>

        </div>

        <!-- PERFIL -->
        <div class="mb-3">

          <label class="form-label">
            Perfil
          </label>

          <select
            class="form-select"
            id="selectPerfil"
          >

            <option value="">
              Seleccione perfil
            </option>

          </select>

        </div>

        <!-- MENSAJES -->
        <div id="resultadoPermiso"></div>

        <!-- ============================== -->
        <!-- PERMISOS ACTUALES -->
        <!-- ============================== -->

        <hr>

        <h6 class="mb-3">
          Permisos actuales
        </h6>

        <div id="listaPermisosActuales">

          <div class="text-muted">
            Sin permisos cargados
          </div>

        </div>

      </div>

      <!-- FOOTER -->
      <div class="modal-footer">

        <button
          type="button"
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          Cancelar
        </button>

        <button
          type="button"
          class="btn btn-primary"
          id="btnGuardarPermiso"
        >
          Guardar Permiso
        </button>

      </div>

    </div>

  </div>

</div>


<!-- ===================================================== -->
<!-- MODAL CONFIRMAR ELIMINAR PERMISO -->
<!-- ===================================================== -->

<div
  class="modal fade"
  id="modalEliminarPermiso"
  tabindex="-1"
>

  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header bg-danger text-white">

        <h5 class="modal-title">
          Confirmar eliminación
        </h5>

        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <div class="modal-body">

        ¿Desea eliminar este permiso?

      </div>

      <div class="modal-footer">

        <button
          type="button"
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          Cancelar
        </button>

        <button
          type="button"
          class="btn btn-danger"
          id="btnConfirmarEliminarPermiso"
        >
          Eliminar
        </button>

      </div>

    </div>

  </div>

</div>

  </body>
  <!-- JS externo -->
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/Front_APPs.js"></script>
  <script src="../js/abmUsuarios_AltaDeUsuarioITAS.js"></script>
</html>
