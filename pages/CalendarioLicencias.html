<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/DiseñoGeneral.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="../images/Favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <title>CALENDARIO DE LICENCIAS</title>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar position-relative">
        <div class="container-fluid d-flex justify-content-between align-items-center navbar-container">
            <a class="navbar-brand nvbar d-flex align-items-center" href="../pages/Front_APPs.html">
                <img src="../images/teco.png" alt="Logo" width="70" height="22" class="d-inline-block">
                <span class="ms-2">PORTAL ITAS</span>
            </a>
            <span class="navbar-text nvbar navbar-center">Calendario de Licencias</span>
        </div>
    </nav>
<div class="container-fluid mt-4">

  <!-- Filtros -->
<div class="row mb-3 align-items-end">

  <div class="col-auto">
    <label class="form-label fw-semibold">Año-Mes</label>
    <select id="filtroMes" class="form-select form-select-sm"></select>
  </div>

  <div class="col-auto">
    <label class="form-label fw-semibold">Grupo</label>
    <select id="filtroGrupo" class="form-select form-select-sm">
      <option value="">Todos</option>
      <option value="NPlay">Nplay</option>
      <option value="Legado">Legado</option>
      <option value="Itas">Itas</option>
      <option value="PPAY">PPay</option>
      <option value="Gestion">Gestion</option>
      <option value="N2 Aseguramiento">N2 Aseguramiento</option>
    </select>
  </div>

  <div class="col-auto">
    <label class="form-label fw-semibold">Subgrupo</label>
    <select id="filtroSubgrupo" class="form-select form-select-sm" disabled>
      <option value="">Todos</option>
    </select>
  </div>

  <!-- Botón -->
  <div class="col ms-auto text-end">
    <button id="btnCrearLicencia" class="btn btn-primary btn-sm">
      Crear Licencia
    </button>
  </div>
</div>
  


  <!-- Leyenda (vacía por ahora) -->
  <div id="leyendaLicencias" class="mb-3"></div>

  <!-- Calendario -->
  <div id="contenedorCalendario"></div>

</div>


<!-- MODAL CREAR LICENCIA -->

<div class="modal fade" id="modalCrearLicencia" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Crear Licencia</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <div class="container">

          <!-- Tipo de licencia -->
          <div class="mb-4">
            <label class="form-label fw-semibold">Tipo de licencia</label>
            <select id="tipoLicencia" class="form-select">
              <option value="">Seleccionar</option>
              <option>Franco Compensatorio</option>
              <option>Compensación Horas Adic</option>
              <option>Compensacion horas extras feriado</option>
              <option>Examen de Estudios</option>
              <option>Mudanza</option>
              <option>Donación de sangre</option>
              <option>Credito Permiso Gremial</option>
              <option>Paro</option>
              <option>Licencia por Enfermedad</option>
              <option>Lic Enf Familiar</option>
              <option>LicEnfFLiar C/Goce</option>
              <option>Fallecimiento Familiar</option>
              <option>Lic. por Nacimiento Adicional</option>
              <option>Accidente de Trabajo</option>
              <option>Vacaciones Legales</option>
              <option>Vacaciones pactadas</option>
            </select>
          </div>

          <!-- Desde -->
          <div class="mb-4">
            <label class="form-label fw-semibold">Desde</label>
            <input type="date" id="fechaDesde" class="form-control">
          </div>

          <!-- Hasta -->
          <div class="mb-4">
            <label class="form-label fw-semibold">Hasta</label>
            <input type="date" id="fechaHasta" class="form-control">
          </div>

          <!-- Comentario -->
          <div class="mb-4">
            <label class="form-label fw-semibold">Comentario</label>
            <textarea id="comentarioLicencia" class="form-control" rows="4"></textarea>
          </div>

          <!-- Botones -->
          <div class="d-flex gap-3">

            <button id="btnCargarLicencia" class="btn btn-success">
              Cargar Licencia
            </button>

            <button id="btnVerMisLicencias" class="btn btn-secondary">
              Ver mis licencias
            </button>

          </div>

        </div>

      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="modalMisLicencias" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Mis Licencias</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <table class="table table-striped">
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Desde</th>
              <th>Hasta</th>
              <th>Estado</th>
            </tr>
          </thead>

          <tbody id="tablaMisLicencias">
          </tbody>

        </table>

      </div>

    </div>
  </div>
</div>



<script src="../js/config.js"></script>
<script src="../js/calendarioLicencias.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>


</body>
