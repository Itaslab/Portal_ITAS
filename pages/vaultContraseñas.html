<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/DiseñoGeneral.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="../images/Favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <title>Seguridad Informatica</title>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar position-relative">
        <div class="container-fluid d-flex justify-content-between align-items-center navbar-container">
            <a class="navbar-brand nvbar d-flex align-items-center" href="../pages/Front_APPs.html">
                <img src="../images/teco.png" alt="Logo" width="70" height="22" class="d-inline-block">
                <span class="ms-2">PORTAL ITAS</span>
            </a>
            <span class="navbar-text nvbar navbar-center">Seguridad Informatica</span>
            <div class="d-flex align-items-center gap-2">
        <a id="openProfile" style="cursor:pointer; color: #fff; text-decoration: underline;">Mi perfil</a>
        <button class="nvbar" onclick="history.back()" style="background:none; border:1px solid white; color:white; padding:4px 10px; border-radius:4px;">
      Volver
    </button>
      </div>
        </div>
    </nav>

  <!-- Modal Perfil -->
  <div class="modal fade" id="perfilModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Mi Perfil</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input id="perfilNombre" class="form-control" readonly />
          </div>
          <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input id="perfilApellido" class="form-control" readonly />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="perfilEmail" class="form-control" readonly />
          </div>
          <hr />
          <h6>Cambiar contraseña</h6>
          <div class="mb-3">
            <label class="form-label">Contraseña actual</label>
            <input id="perfilCurrentPass" type="password" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Nueva contraseña</label>
            <input id="perfilNewPass" type="password" maxlength="15" class="form-control" />
            <div class="form-text">La contraseña debe tener entre 8 y 15 caracteres.</div>
          </div>
          <div id="perfilResult" class="mt-2"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button id="perfilSaveBtn" type="button" class="btn btn-primary">Guardar</button>
        </div>
      </div>
    </div>
  </div>

    <!-- Formulario de Bóveda de Contraseñas -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form id="vaultForm">
                    <h3 class="mb-4" id="formTitle">Crear Nueva Contraseña</h3>
                    
                    <div class="mb-3">
                        <label for="sistema" class="form-label">Ingresar Sistema</label>
                        <input type="text" class="form-control" id="sistema" name="sistema" required>
                    </div>

                    <div class="mb-3">
                        <label for="usuario" class="form-label">Ingresar Usuario</label>
                        <input type="text" class="form-control" id="usuario" name="usuario" required>
                    </div>

                    <div class="mb-3">
                        <label for="contrasena" class="form-label">Ingresar Contraseña</label>
                        <input type="password" class="form-control" id="contrasena" name="contrasena" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" id="btnSubmit">Guardar</button>
                </form>
                
                <!-- Botón para volver a la galería -->
                <div class="mt-3 text-center">
                    <a href="../pages/SeguridadInformatica.html" class="btn btn-secondary">Volver a la Galería</a>
                </div>
    <script src="../js/config.js"></script>
    <script src="../js/Front_APPs.js"></script>
    <script src="../js/vaultContraseñas.js"></script>
</body>
</html>
